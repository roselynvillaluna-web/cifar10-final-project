<!DOCTYPE html>

<html>

<head>

    <title>CIFAR-10 Classifier</title>

</head>

<body>

    <h1>CIFAR-10 Image Classifier</h1>

    <form
        action="/predict"
        method="post"
        enctype="multipart/form-data"
    >

        <input type="file" name="file">

        <button type="submit">
            Predict
        </button>

    </form>

    {% if prediction %}

    <h2>
        Prediction: {{ prediction }}
    </h2>

    <h3>
        Confidence: {{ confidence }}%
    </h3>

    {% endif %}

</body>

</html>
